<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {% include head.html %}
</head>
<body>
  <div class="reading-progress-bar" id="reading-progress"></div>
  <div class="layout">
    {% include sidebar.html %}
    <main class="content">
      <header class="content-header">
        <button class="mobile-menu-btn" aria-label="Toggle navigation menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="search-container">
          <input type="text" id="global-search-input" placeholder="Search writeups..." aria-label="Search">
          <kbd class="search-hotkey">/</kbd>
          <div class="search-results-dropdown" id="global-search-results"></div>
        </div>
      </header>

      {{ content }}
    </main>
  </div>


  <!-- Back to Top Button -->
  <button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <svg class="back-to-top-progress" width="36" height="36" viewBox="0 0 36 36">
      <circle class="back-to-top-progress-bg" cx="18" cy="18" r="16" />
      <circle class="back-to-top-progress-fill" cx="18" cy="18" r="16" />
    </svg>
    <svg class="back-to-top-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15" />
    </svg>
  </button>

  <div class="mobile-overlay"></div>

  <script src="/assets/js/main.js"></script>
</body>
</html>
